    // ==========================================
    // LÓGICA DE LOGIN

    async function iniciarSesion(e) {
        e.preventDefault();
        const userInput = document.getElementById('userNameInput').value.trim();
        const passInput = document.getElementById('passwordInput').value.trim();
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('loginError');

        btn.innerHTML = '<span class="loader"></span> Verificando...';
        btn.disabled = true;
        errorMsg.classList.add('hidden');

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: userInput,
                    password: passInput
                })
            });

            const data = await response.json();

            if (response.ok && data.ok) {
                nombreEducadora = data.displayName;
                usuarioActual = data.userKey;
                document.getElementById('nombreEducadoraDisplay').textContent = nombreEducadora;
                verificarCertificadoGuardado();
                mostrarCurso();
                return;
            }

            mostrarError(btn, errorMsg, "Usuario o contraseña incorrectos. Verifica tu información.");
        } catch (error) {
            console.error("Error de login:", error);
            mostrarError(btn, errorMsg, "Error al conectar con la base de datos. Intenta de nuevo.");
        }
    }

    function mostrarError(btn, errorElement, mensaje) {
        btn.innerHTML = 'Entrar al Curso';
        btn.disabled = false;
        errorElement.innerText = mensaje;
        errorElement.classList.remove('hidden');
    }

    function mostrarCurso() {
        document.getElementById('login-view').classList.add('hidden');

    function generarPreguntasExamen() {
        if (examenGenerado) return;

        const shuffled = [...poolExamenFinal].sort(() => 0.5 - Math.random());
        preguntasExamenActual = shuffled.slice(0, 20);

        const container = document.getElementById('examen-preguntas-container');
        container.innerHTML = '';

        preguntasExamenActual.forEach((preg, index) => {
            container.innerHTML += `
                <div class="bg-white p-5 rounded-2xl border border-gray-200 pregunta-examen transition-colors shadow-sm" data-index="${index}">
                    <p class="font-bold text-gray-800 mb-3">${index + 1}. ${preg.q}</p>
                    <div class="space-y-2 text-sm text-gray-700">
                        <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer bg-gray-50 hover:bg-amber-50 transition-colors">
                            <input type="radio" name="ex_${index}" value="a"> ${preg.a}
                        </label>
                        <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer bg-gray-50 hover:bg-amber-50 transition-colors">
                            <input type="radio" name="ex_${index}" value="b"> ${preg.b}
                        </label>
                        <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer bg-gray-50 hover:bg-amber-50 transition-colors">
                            <input type="radio" name="ex_${index}" value="c"> ${preg.c}

                </div>
            `;
        });

        examenGenerado = true;
    }

    function cambiarModulo(idModulo) {
        document.querySelectorAll('.content-section').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

        document.getElementById(`mod-${idModulo}`).classList.remove('hidden');

        const index = modulos.indexOf(idModulo);
        currentIndex = index;
        document.querySelectorAll('.nav-item')[index].classList.add('active');

        actualizarBotonesNavegacion();

        if (idModulo === 'evaluacion') {
            generarPreguntasExamen();
        }

        const navMenu = document.getElementById('navMenu');
        if (window.innerWidth < 640 && !navMenu.classList.contains('hidden')) {
            navMenu.classList.add('hidden');
        }

        document.querySelector('main').scrollTop = 0;
    }

    function navegar(direccion) {
        let nuevoIndex = currentIndex + direccion;
        if (nuevoIndex >= 0 && nuevoIndex < modulos.length) {
            cambiarModulo(modulos[nuevoIndex]);
        }
    }

    function actualizarBotonesNavegacion() {
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');

        if (currentIndex === 0) {
            btnPrev.classList.add('hidden');
        } else {
            btnPrev.classList.remove('hidden');
        }

        if (currentIndex === modulos.length - 1) {
            btnNext.classList.add('hidden');
        } else {
            btnNext.classList.remove('hidden');
        }
    }

    async function generarActividadIA() {
        const btn = document.getElementById('btnGenerarIA');
        const resultContainer = document.getElementById('aiResultContainer');
        const resultText = document.getElementById('aiResultText');

        const edad = document.getElementById('iaEdad').options[document.getElementById('iaEdad').selectedIndex].text;
        const objetivo = document.getElementById('iaObjetivo').value;
        const contexto = document.getElementById('iaContexto').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="loader border-white border-top-indigo-200"></span> Generando magia...';
        resultContainer.classList.remove('hidden');
        resultText.innerHTML = '<div class="text-center text-indigo-400 py-4"><i class="fa-solid fa-brain fa-bounce text-2xl mb-2"></i><p>Pensando una actividad increíble...</p></div>';

        const promptUsuario = `Actúa como un pedagogo experto en el método de educación emocional respetuosa BabyStar.
Crea una única actividad breve, práctica y lúdica para niños de ${edad}.
Objetivo del capítulo: ${objetivo}.
Contexto o materiales disponibles: ${contexto || 'Utiliza materiales comunes y seguros de aula'}.
No incluyas introducciones genéricas. Devuelve la respuesta directamente en este formato exacto:

**Título de la Actividad:** [Nombre creativo]
**Materiales:** [Lista]
**Paso a paso:** [Instrucciones claras para la educadora]
**Frase ancla:** [Qué debe decirle la educadora a los niños durante la actividad]`;

        try {
            const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptUsuario }] }],
                    systemInstruction: {
                        parts: [{
                            text: "Eres una IA experta en educación emocional infantil. Responde siempre de forma amable, pedagógica y en español."
                        }]
                    }
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Error de red con la API: ${response.status} - ${errorText}`);
            }

            const data = await response.json();
            let textoRespuesta = data.candidates?.[0]?.content?.parts?.[0]?.text;

            if (textoRespuesta) {
                textoRespuesta = textoRespuesta.replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-800 text-base block mt-3 mb-1"><i class="fa-solid fa-star fa-2xs text-yellow-400 mr-1"></i> $1</strong>');
                textoRespuesta = textoRespuesta.replace(/\n/g, '<br>');
                resultText.innerHTML = textoRespuesta;
            } else {
                throw new Error("Respuesta vacía");
            }
        } catch (error) {
            console.error("Error IA:", error);
            resultText.innerHTML = '<p class="text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation"></i> Vaya, hubo un pequeño problema de conexión con el Asistente IA. Por favor, intenta presionar el botón de nuevo.</p>';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Crear Actividad';
        }
    }

    function calificarExamen() {
        const nombre = nombreEducadora;
        const errorElement = document.getElementById('examen-error');

        errorElement.classList.add('hidden');

        let score = 0;
        let allAnswered = true;

        preguntasExamenActual.forEach((preg, index) => {
            const radio = document.querySelector(`input[name="ex_${index}"]:checked`);
            const val = radio?.value;
            const divPregunta = document.querySelector(`.pregunta-examen[data-index="${index}"]`);

            divPregunta.classList.remove('border-red-400', 'border-green-400', 'bg-red-50', 'bg-green-50');

            if (!val) {
                allAnswered = false;
            } else if (val === preg.correct) {
                score++;
                divPregunta.classList.add('border-green-400', 'bg-green-50');
            } else {
                divPregunta.classList.add('border-red-400', 'bg-red-50');
            }
        });

        if (!allAnswered) {
            errorElement.textContent = "Por favor, responde todas las 20 preguntas del examen.";
            errorElement.classList.remove('hidden');
            return;
        }

        if (score >= 18) {
            const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            const fechaHoy = new Date().toLocaleDateString('es-ES', opcionesFecha) + ' hrs';

            const datosCertificado = { nombre: nombre, fecha: fechaHoy };
            localStorage.setItem(`BabyStarCert_${usuarioActual}`, JSON.stringify(datosCertificado));

            mostrarExitoCertificado(nombre, fechaHoy);
            document.querySelector('#mod-evaluacion').scrollTo(0, 0);
        } else {
            errorElement.innerHTML = `Obtuviste <strong>${score} de 20</strong>.<br>Necesitas al menos 18 respuestas correctas para aprobar.<br>Revisa las marcadas en <span class="text-red-600">rojo</span> e inténtalo nuevamente.`;
            errorElement.classList.remove('hidden');
        }
    }

    function verificarCertificadoGuardado() {
        const dataGuardada = localStorage.getItem(`BabyStarCert_${usuarioActual}`);
        if (dataGuardada) {
            const datos = JSON.parse(dataGuardada);
            mostrarExitoCertificado(datos.nombre, datos.fecha);
        } else {
            document.getElementById('examen-container').classList.remove('hidden');
            document.getElementById('exito-container').classList.add('hidden');
        }
    }

    function mostrarExitoCertificado(nombre, fecha) {
        document.getElementById('examen-container').classList.add('hidden');
        document.getElementById('exito-container').classList.remove('hidden');

        document.getElementById('diploma-nombre-render').textContent = nombre;
        document.getElementById('diploma-fecha').textContent = fecha;

        document.getElementById('nav-evaluacion').innerHTML = '<i class="fa-solid fa-award text-green-500 w-5 text-center"></i> Mi Certificado';
    }

    function descargarPDF(event) {
        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Generando PDF...';
        btn.disabled = true;

        const wrapper = document.getElementById('pdf-wrapper');
        const elemento = document.getElementById('diploma-imprimible');

        wrapper.style.left = "0px";

        const opciones = {
            margin: 0.25,
            filename: `Certificado_BabyStar_${document.getElementById('diploma-nombre-render').textContent.replace(/ /g, '_')}.pdf`,
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2, useCORS: true, logging: false, windowWidth: 1008 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
        };

        html2pdf().set(opciones).from(elemento).save().then(() => {
            wrapper.style.left = "-10000px";
            btn.innerHTML = originalText;
            btn.disabled = false;
        }).catch(err => {
            console.error("Error al generar el PDF:", err);
            wrapper.style.left = "-10000px";
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    }
</script>
